[technology-description]
foundry-science-packs-tech=Schaltet das Gießen von Wissenschaftspaketen frei. Weniger komplex aber zum selben Preis. Die geringere Komplexität geht aber auch auf Kosten der möglichen Effizienzsteigung durch Module.
emp-science-packs-tech=Schaltet das EMen von Wissenschaftspaketen frei. Weniger komplex aber zum selben Preis. Die geringere Komplexität geht aber auch auf Kosten der möglichen Effizienzsteigung durch Module.
biochamber-science-packs-tech=Schaltet das Biologisieren von Wissenschaftspaketen frei. Genau so komplex und zum selben Preis.
foundry-science-packs-productivity-tech=Erhöht den Ertrag aus der Herstellung der Wissenschaftspaketen, die in der Gießerei hergestellt werden.
emp-science-packs-productivity-tech=Erhöht den Ertrag aus der Herstellung der Wissenschaftspaketen, die in der EM Fabrik hergestellt werden.
biochamber-science-packs-productivity-tech=Erhöht den Ertrag aus der Herstellung der Wissenschaftspaketen, die in der Biokammer hergestellt werden.

[mod-setting-name]
allow-heavy-military-tech=Erlaubt schwere Militärtechnik.
allow-planetary-sci-productivity=Produktivitätsbonus zusätzlich auch für die Planet-spezifischen Forschungspakete.
science-productivity-max-level=Maximale Stufe der Wissenschaftspaket-Produktivitätsbonus-Forschung

[mod-setting-description]
allow-heavy-military-tech=Momentan nicht implementiert. Aktivieren führt wahrscheinlich zum Absturz des Spiels.
allow-planetary-sci-productivity=Zum Beispiel für Metallurgie
science-productivity-max-level="-1" bedeutet unendlich, "0" deaktiviert es und jede positive Zahl ist die maximale Stufe.