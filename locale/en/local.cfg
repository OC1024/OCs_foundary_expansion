[mod-setting-description]
allow-casting-science-packs=The science pack have the same cost as the original science pack but are less complex and profit from the built in efficiency of the foundry.
allow-heavy-military-tech=Not implemented yet: Will probably result in crashing the game.
science-productivity-max-level="-1" means infinite, "0" disables it and any positive value is just the max level.