[technology-description]
foundry-science-packs-tech=Unlocks casting four of the science packs in the foundry. It's less complex but it costs the same.
emp-science-packs-tech=Unlocks EMing one of the science packs in the EM plant. It's less complex but it costs the same.
biochamber-science-packs-tech=Unlocks biochamberering four of the science packs in the biochamberer. It's less complex but it costs the same.
foundry-science-packs-productivity-tech=Increase the productivity when using the foundry science packs recipes.
emp-science-packs-productivity-tech=Increase the productivity when using the EM plant science packs recipes.
biochamber-science-packs-productivity-tech=Increase the productivity when using the biochamber science packs recipes.

